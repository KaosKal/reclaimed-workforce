<text x="800" y="76" fill="#FFFFFF" style="font-family:Liberation Sans,Arial,sans-serif;font-size:28px;font-weight:bold;text-anchor:middle;fill:#FFFFFF;">From Wish to Mandate</text>
<text x="800" y="123" fill="#5A6070" style="font-family:Liberation Sans,Arial,sans-serif;font-size:16px;font-weight:normal;text-anchor:middle;fill:#5A6070;font-style:italic;">A governance record specifies all four elements. The first draft usually specifies none.</text>
